<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Pong</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540" aria-label="Retro Pong game"></canvas>
  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      // --------- Constants ---------
      const WORLD = { w: 960, h: 540 };
      const PADDLE_W = 14;
      const PADDLE_H = 90;
      const PADDLE_SPEED = 520;
      const BALL_SIZE = 12;
      const BALL_SPEED_START = 340;
      const BALL_SPEED_MAX = 820;
      const WIN_SCORE = 11;

      // --------- Input ---------
      const keys = new Set();
      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        keys.add(k);

        if ([" ", "arrowup", "arrowdown", "w", "s", "p", "r", "1", "2"].includes(k)) {
          e.preventDefault();
        }

        if (state.scene === "title") {
          if (k === "1") state.mode = "cpu";
          if (k === "2") state.mode = "2p";
          if (k === " ") startMatch();
        } else {
          if (k === "p") state.paused = !state.paused;
          if (k === "r") startMatch();
          if (k === " " && !state.served && !state.paused && state.scene === "play") serveBall();
        }
      });
      window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

      // --------- Audio (retro beeps via Web Audio API) ---------
      const audio = {
        ctx: null,
        unlocked: false,
        ensure() {
          if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          if (!this.unlocked && this.ctx.state === "suspended") this.ctx.resume();
          this.unlocked = true;
        },
        beep(freq = 440, dur = 0.04, type = "square", vol = 0.05) {
          this.ensure();
          const t = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t);
          gain.gain.setValueAtTime(vol, t);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          osc.connect(gain).connect(this.ctx.destination);
          osc.start(t);
          osc.stop(t + dur);
        }
      };
      window.addEventListener("pointerdown", () => audio.ensure(), { once: true });

      // --------- Game state ---------
      const state = {
        scene: "title", // title | play | over
        mode: "cpu", // cpu | 2p
        paused: false,
        served: false,
        winner: "",
        shake: 0,
        trail: [],
        paddles: {
          left: { x: 24, y: WORLD.h / 2 - PADDLE_H / 2, vy: 0, squash: 0 },
          right: { x: WORLD.w - 24 - PADDLE_W, y: WORLD.h / 2 - PADDLE_H / 2, vy: 0, squash: 0 }
        },
        ball: {
          x: WORLD.w / 2 - BALL_SIZE / 2,
          y: WORLD.h / 2 - BALL_SIZE / 2,
          vx: 0,
          vy: 0,
          speed: BALL_SPEED_START,
          lastScorer: -1
        },
        score: { left: 0, right: 0 }
      };

      function resetBall(afterPoint = false) {
        const b = state.ball;
        b.x = WORLD.w / 2 - BALL_SIZE / 2;
        b.y = WORLD.h / 2 - BALL_SIZE / 2;
        b.vx = 0;
        b.vy = 0;
        b.speed = BALL_SPEED_START;
        state.served = false;
        state.trail.length = 0;
        if (!afterPoint) b.lastScorer = Math.random() > 0.5 ? 1 : -1;
      }

      function startMatch() {
        state.scene = "play";
        state.paused = false;
        state.winner = "";
        state.score.left = 0;
        state.score.right = 0;
        state.paddles.left.y = WORLD.h / 2 - PADDLE_H / 2;
        state.paddles.right.y = WORLD.h / 2 - PADDLE_H / 2;
        state.paddles.left.squash = 0;
        state.paddles.right.squash = 0;
        resetBall(false);
      }

      function serveBall() {
        const b = state.ball;
        const dir = b.lastScorer === 1 ? -1 : 1;
        const angle = (Math.random() * 0.8 - 0.4); // +-0.4 rad
        b.vx = Math.cos(angle) * dir;
        b.vy = Math.sin(angle);
        state.served = true;
        audio.beep(300, 0.03, "square", 0.04);
      }

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function updatePaddle(p, upKey, downKey, dt) {
        let dir = 0;
        if (keys.has(upKey)) dir -= 1;
        if (keys.has(downKey)) dir += 1;
        p.vy = dir * PADDLE_SPEED;
        p.y = clamp(p.y + p.vy * dt, 0, WORLD.h - PADDLE_H);
        p.squash = Math.max(0, p.squash - dt * 9);
      }

      function updateCpu(dt) {
        const p = state.paddles.right;
        const target = state.ball.y + BALL_SIZE * 0.5 - PADDLE_H * 0.5;
        const deadzone = 8;
        if (target < p.y - deadzone) p.vy = -PADDLE_SPEED * 0.92;
        else if (target > p.y + deadzone) p.vy = PADDLE_SPEED * 0.92;
        else p.vy = 0;
        p.y = clamp(p.y + p.vy * dt, 0, WORLD.h - PADDLE_H);
        p.squash = Math.max(0, p.squash - dt * 9);
      }

      function addTrail() {
        state.trail.push({ x: state.ball.x, y: state.ball.y, life: 0.22 });
        if (state.trail.length > 14) state.trail.shift();
      }

      function updateTrail(dt) {
        for (const t of state.trail) t.life -= dt;
        state.trail = state.trail.filter((t) => t.life > 0);
      }

      function paddleCollision(paddle, isLeft) {
        const b = state.ball;
        const hit = b.x < paddle.x + PADDLE_W &&
                    b.x + BALL_SIZE > paddle.x &&
                    b.y < paddle.y + PADDLE_H &&
                    b.y + BALL_SIZE > paddle.y;
        if (!hit) return;

        const incomingHard = Math.abs(b.vx * b.speed) > 430;
        const bounceX = isLeft ? 1 : -1;

        // Position correction avoids sticking.
        b.x = isLeft ? paddle.x + PADDLE_W : paddle.x - BALL_SIZE;

        // Re-aim based on where ball struck paddle.
        const rel = ((b.y + BALL_SIZE / 2) - (paddle.y + PADDLE_H / 2)) / (PADDLE_H / 2);
        const angle = rel * 0.85;
        b.vx = Math.cos(angle) * bounceX;
        b.vy = Math.sin(angle);
        b.speed = Math.min(BALL_SPEED_MAX, b.speed * 1.04 + 12);

        paddle.squash = 1;
        if (incomingHard) state.shake = Math.max(state.shake, 0.12);
        audio.beep(incomingHard ? 540 : 460, incomingHard ? 0.06 : 0.04, "square", 0.06);
      }

      function scorePoint(leftScored) {
        if (leftScored) {
          state.score.left += 1;
          state.ball.lastScorer = 1;
        } else {
          state.score.right += 1;
          state.ball.lastScorer = -1;
        }

        audio.beep(leftScored ? 220 : 180, 0.12, "sawtooth", 0.07);

        if (state.score.left >= WIN_SCORE || state.score.right >= WIN_SCORE) {
          state.scene = "over";
          state.winner = state.score.left > state.score.right ? "LEFT" : "RIGHT";
        }

        resetBall(true);
      }

      function updateBall(dt) {
        if (!state.served) return;

        const b = state.ball;
        b.x += b.vx * b.speed * dt;
        b.y += b.vy * b.speed * dt;

        addTrail();

        if (b.y <= 0) {
          b.y = 0;
          b.vy *= -1;
          audio.beep(360, 0.03, "triangle", 0.04);
        } else if (b.y + BALL_SIZE >= WORLD.h) {
          b.y = WORLD.h - BALL_SIZE;
          b.vy *= -1;
          audio.beep(360, 0.03, "triangle", 0.04);
        }

        paddleCollision(state.paddles.left, true);
        paddleCollision(state.paddles.right, false);

        if (b.x + BALL_SIZE < 0) scorePoint(false);
        if (b.x > WORLD.w) scorePoint(true);
      }

      function update(dt) {
        if (state.scene !== "play" || state.paused) return;

        updatePaddle(state.paddles.left, "w", "s", dt);
        if (state.mode === "2p") updatePaddle(state.paddles.right, "arrowup", "arrowdown", dt);
        else updateCpu(dt);

        updateBall(dt);
        updateTrail(dt);
        state.shake = Math.max(0, state.shake - dt * 4.5);
      }

      // --------- Rendering ---------
      function drawText(text, x, y, size = 24, align = "center") {
        ctx.font = `${size}px "Courier New", monospace`;
        ctx.fillStyle = "#fff";
        ctx.textAlign = align;
        ctx.fillText(text, x, y);
      }

      function drawScene() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, WORLD.w, WORLD.h);

        const shakeAmp = state.shake * 8;
        const sx = (Math.random() * 2 - 1) * shakeAmp;
        const sy = (Math.random() * 2 - 1) * shakeAmp;
        ctx.translate(sx, sy);

        ctx.fillStyle = "#000";
        ctx.fillRect(-16, -16, WORLD.w + 32, WORLD.h + 32);

        // Center dashed line.
        ctx.fillStyle = "#fff";
        for (let y = 8; y < WORLD.h; y += 28) {
          ctx.fillRect(WORLD.w / 2 - 2, y, 4, 14);
        }

        // Ball trail (faint).
        for (const t of state.trail) {
          const a = t.life / 0.22;
          ctx.globalAlpha = 0.17 * a;
          ctx.fillRect(t.x, t.y, BALL_SIZE, BALL_SIZE);
        }
        ctx.globalAlpha = 1;

        drawPaddle(state.paddles.left);
        drawPaddle(state.paddles.right);

        // Ball.
        ctx.fillRect(state.ball.x, state.ball.y, BALL_SIZE, BALL_SIZE);

        // Retro score.
        drawText(String(state.score.left), WORLD.w * 0.25, 58, 52);
        drawText(String(state.score.right), WORLD.w * 0.75, 58, 52);

        if (state.scene === "title") {
          overlay(0.72);
          drawText("PONG", WORLD.w / 2, 180, 72);
          drawText("1: VS CPU    2: 2-PLAYER", WORLD.w / 2, 250, 28);
          drawText(`MODE: ${state.mode === "cpu" ? "VS CPU" : "2-PLAYER"}`, WORLD.w / 2, 292, 24);
          drawText("SPACE: START / SERVE", WORLD.w / 2, 342, 20);
          drawText("W/S + ARROWS, P: PAUSE, R: RESTART", WORLD.w / 2, 374, 18);
        }

        if (state.scene === "play" && !state.served) {
          drawText("PRESS SPACE TO SERVE", WORLD.w / 2, WORLD.h - 34, 20);
        }

        if (state.paused && state.scene === "play") {
          overlay(0.45);
          drawText("PAUSED", WORLD.w / 2, WORLD.h / 2, 44);
        }

        if (state.scene === "over") {
          overlay(0.65);
          drawText(`${state.winner} PLAYER WINS`, WORLD.w / 2, WORLD.h / 2 - 18, 38);
          drawText("FIRST TO 11", WORLD.w / 2, WORLD.h / 2 + 20, 20);
          drawText("R TO RESTART", WORLD.w / 2, WORLD.h / 2 + 54, 20);
        }
      }

      function drawPaddle(p) {
        const t = p.squash;
        const scaleX = 1 + 0.28 * t;
        const scaleY = 1 - 0.18 * t;
        const cx = p.x + PADDLE_W / 2;
        const cy = p.y + PADDLE_H / 2;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scaleX, scaleY);
        ctx.fillRect(-PADDLE_W / 2, -PADDLE_H / 2, PADDLE_W, PADDLE_H);
        ctx.restore();
      }

      function overlay(alpha) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, WORLD.w, WORLD.h);
        ctx.restore();
      }

      // --------- Main loop ---------
      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) / 1000); // clamp delta for stability
        last = now;

        update(dt);
        drawScene();
        requestAnimationFrame(frame);
      }

      resetBall(false);
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
